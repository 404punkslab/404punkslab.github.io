<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Punk</title>
    <meta property="og:title" content="404 Punk" />
    <meta property="og:description" content="404 signal detected | 10k punks loading... | built by frens | powered by vibes | welcome to 404 punks" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://404punks.xyz" />
    <meta property="og:image" content="https://ipfs.io/ipfs/bafybeid4akomqdqr5ugv22gas4gm7cqgxja66omjfuomtbq64v5m7c4fkm/107.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #008080;
            background-image:
                repeating-linear-gradient(0deg,  rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(90deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'MS Sans Serif', 'Tahoma', Arial, sans-serif;
        }

        /* ── canvas wrapper, square, fills viewport ── */
        .canvas-wrap {
            position: relative;
            width:  100vmin;
            height: 100vmin;
        }

        /* ── pixel grid with visible cell borders (2nd image style) ── */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            grid-template-rows:    repeat(24, 1fr);
            width: 100%;
            height: 100%;
            /* gap creates the visible grid lines */
            gap: 1px;
            background: #555; /* gap colour = grid line colour */
            image-rendering: pixelated;
        }
        .grid-container.hidden { display: none; }

        .pixel {
            background: #1f1f33;
            width: 100%;
            height: 100%;
            transition: background 0.06s ease, transform 0.07s ease;
            cursor: pointer;
            image-rendering: pixelated;
        }
        .pixel:hover {
            transform: scale(1.08);
            z-index: 2;
            filter: brightness(1.3);
        }
        .pixel-clicked {
            transform: scale(0.9);
            transition: transform 0.05s;
        }
        .pixel-disabled { cursor: default !important; }
        .pixel-disabled:hover {
            transform: none !important;
            filter: none !important;
        }

        /* ── original image overlay ── */
        .original-image-container {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0; left: 0;
            background: #12121f;
        }
        .original-image-container.visible { display: flex; }
        .original-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
            display: block;
        }

        /* ── Win95 buttons — inside canvas, top-left ── */
        .btn-group {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            display: flex;
            gap: 5px;
        }
        .win95-btn {
            background: #c0c0c0;
            border-top:    2px solid #ffffff;
            border-left:   2px solid #ffffff;
            border-right:  2px solid #404040;
            border-bottom: 2px solid #404040;
            color: #000000;
            font-family: 'MS Sans Serif', 'Tahoma', Arial, sans-serif;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            padding: 3px 16px;
            cursor: pointer;
            text-transform: uppercase;
            min-width: 52px;
            text-align: center;
        }
        .win95-btn:active {
            border-top:    2px solid #404040;
            border-left:   2px solid #404040;
            border-right:  2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 4px 15px 2px 17px;
        }
        .win95-btn.active {
            border-top:    2px solid #404040;
            border-left:   2px solid #404040;
            border-right:  2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background: #a8a8a8;
        }
        .win95-btn:focus-visible { outline: 1px dotted #000; }
    </style>
</head>
<body>
<div class="canvas-wrap">

    <!-- buttons inside canvas top-left -->
    <div class="btn-group">
        <button class="win95-btn active" id="animateBtn">AN</button>
        <button class="win95-btn"        id="originalBtn">OG</button>
    </div>

    <div class="grid-container" id="pixelGrid"></div>

    <div class="original-image-container" id="originalImageContainer">
        <img id="originalImage" src="" alt="404 Punk Original">
    </div>

</div>

<script>
(function () {
    const AN_BASE = 'https://ipfs.io/ipfs/bafybeid4akomqdqr5ugv22gas4gm7cqgxja66omjfuomtbq64v5m7c4fkm';
    const OG_BASE = 'https://ipfs.io/ipfs/bafybeid4akomqdqr5ugv22gas4gm7cqgxja66omjfuomtbq64v5m7c4fkm';

    let TOKEN_ID = 107;
    try {
        const p = new URLSearchParams(window.location.search);
        const id = p.get('id') || p.get('tokenId') || p.get('token');
        if (id) { const n = parseInt(id,10); if (!isNaN(n) && n>0) TOKEN_ID=n; }
        else { const n = parseInt(window.location.pathname.split('/').pop(),10); if (!isNaN(n) && n>0) TOKEN_ID=n; }
    } catch(_){}

    const PALETTE = [
        "#000000","#FFFFFF","#FF0000","#00FF00","#0000FF","#FFFF00","#00FFFF","#FF00FF",
        "#C0C0C0","#808080","#800000","#808000","#008000","#800080","#008080","#000080",
        "#FFA500","#A52A2A","#8B4513","#2F4F4F","#556B2F","#D2691E","#FF7F50","#6495ED",
        "#DC143C","#00FFFF","#00008B","#008B8B","#B8860B","#A9A9A9","#006400","#BDB76B",
        "#8B008B","#556B2F","#FF8C00","#9932CC","#8B0000","#E9967A","#8FBC8F","#483D8B",
        "#2F4F4F","#00CED1","#9400D3","#FF1493","#00BFFF","#696969","#1E90FF","#B22222",
        "#FFFAF0","#228B22","#FF00FF","#DCDCDC","#F8F8FF","#FFD700","#DAA520","#808080",
        "#008000","#ADFF2F","#F0FFF0","#FF69B4","#CD5C5C","#4B0082","#F0E68C","#E6E6FA",
        "#FFF0F5","#7CFC00","#FFFACD","#ADD8E6","#F08080","#E0FFFF","#FAFAD2","#D3D3D3",
        "#90EE90","#FFB6C1","#FFA07A","#20B2AA","#87CEFA","#8470FF","#778899","#B0C4DE",
        "#FFFFE0","#00FF7F","#F5DEB3","#FFE4B5","#FFDEAD","#F5F5DC","#FDF5E6","#FFE4E1",
        "#FAF0E6","#F0F8FF","#F5F5F5","#FFF8DC","#FFEBCD","#FFEFD5","#FFDAB9","#CD853F",
        "#D2691E","#8B4513","#A0522D","#A52A2A","#800000","#FF4500","#FF6347","#FF7F50",
        "#FF8C00","#FFA500","#FFD700","#DAA520","#B8860B","#CD853F","#D2691E","#8B4513",
        "#A0522D","#A52A2A","#800000"
    ];

    const GRID_SIZE = 24;
    const TOTAL     = GRID_SIZE * GRID_SIZE;

    const gridEl            = document.getElementById('pixelGrid');
    const originalContainer = document.getElementById('originalImageContainer');
    const originalImg       = document.getElementById('originalImage');
    const animateBtn        = document.getElementById('animateBtn');
    const originalBtn       = document.getElementById('originalBtn');

    let pixelColorSet     = [];
    let currentColorIndex = new Int8Array(TOTAL);
    let pixelElements     = [];
    let isOriginalMode    = false;
    let imageLoaded       = false;

    function randInt(max) { return Math.floor(Math.random() * max); }
    function rgbToHex(r,g,b){ return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1).toUpperCase(); }
    function hexToRgb(hex){ const n=parseInt(hex.replace('#',''),16); return[(n>>16)&255,(n>>8)&255,n&255]; }
    function closestPaletteIndex(hex){
        const[r,g,b]=hexToRgb(hex); let min=Infinity,idx=0;
        for(let i=0;i<PALETTE.length;i++){
            const[pr,pg,pb]=hexToRgb(PALETTE[i]);
            const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;
            if(d<min){min=d;idx=i;if(d===0)break;}
        }
        return idx;
    }

    function buildGrid(){
        const frag=document.createDocumentFragment();
        pixelElements=[];pixelColorSet=[];currentColorIndex.fill(0);
        for(let i=0;i<TOTAL;i++){
            const set=new Set();
            while(set.size<4)set.add(randInt(PALETTE.length));
            const arr=Array.from(set); pixelColorSet.push(arr);
            const px=document.createElement('div');
            px.className='pixel'; px.dataset.index=i;
            px.style.backgroundColor=PALETTE[arr[0]];
            frag.appendChild(px); pixelElements.push(px);
        }
        gridEl.appendChild(frag);
        gridEl.addEventListener('click',function(e){
            if(isOriginalMode)return;
            const px=e.target;
            if(!px.classList.contains('pixel')||px.classList.contains('pixel-disabled'))return;
            const i=parseInt(px.dataset.index,10);
            const ni=(currentColorIndex[i]+1)%4;
            currentColorIndex[i]=ni;
            px.style.backgroundColor=PALETTE[pixelColorSet[i][ni]];
            px.classList.add('pixel-clicked');
            setTimeout(()=>px.classList.remove('pixel-clicked'),150);
        });
    }

    function loadImageToGrid(url,cb){
        const img=new Image(); img.crossOrigin='anonymous';
        img.onload=function(){
            const canvas=document.createElement('canvas');
            canvas.width=GRID_SIZE;canvas.height=GRID_SIZE;
            const ctx=canvas.getContext('2d');
            ctx.imageSmoothingEnabled=false;
            ctx.drawImage(img,0,0,GRID_SIZE,GRID_SIZE);
            const data=ctx.getImageData(0,0,GRID_SIZE,GRID_SIZE).data;
            for(let i=0;i<TOTAL;i++){
                const o=i*4;
                const mainIdx=closestPaletteIndex(rgbToHex(data[o],data[o+1],data[o+2]));
                const set=new Set([mainIdx]);
                while(set.size<4)set.add(randInt(PALETTE.length));
                const arr=Array.from(set);
                const pos=arr.indexOf(mainIdx);
                if(pos>0){arr[pos]=arr[0];arr[0]=mainIdx;}
                pixelColorSet[i]=arr;currentColorIndex[i]=0;
                pixelElements[i].style.backgroundColor=PALETTE[mainIdx];
            }
            imageLoaded=true; if(cb)cb();
        };
        img.onerror=function(){console.warn('404 Punk: load failed',url);imageLoaded=true;if(cb)cb();};
        img.src=url;
    }

    function setANMode(){
        if(!imageLoaded)return;
        isOriginalMode=false;
        animateBtn.classList.add('active'); originalBtn.classList.remove('active');
        gridEl.classList.remove('hidden'); originalContainer.classList.remove('visible');
        pixelElements.forEach(el=>{el.classList.remove('pixel-disabled');el.style.cursor='pointer';});
    }
    function setOGMode(){
        if(!imageLoaded)return;
        isOriginalMode=true;
        originalBtn.classList.add('active'); animateBtn.classList.remove('active');
        gridEl.classList.add('hidden'); originalContainer.classList.add('visible');
        originalImg.src=OG_BASE+'/'+TOKEN_ID+'.png';
        pixelElements.forEach(el=>{el.classList.add('pixel-disabled');el.style.cursor='default';});
    }

    buildGrid();
    loadImageToGrid(AN_BASE+'/'+TOKEN_ID+'.png',setANMode);
    animateBtn.addEventListener('click',setANMode);
    originalBtn.addEventListener('click',setOGMode);
})();
</script>
</body>
</html>
