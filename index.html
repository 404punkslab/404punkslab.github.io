<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>404 PUNKS | Genesis Mint + Smart Match System</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #b8e1fc 0%, #e0f2fe 50%, #bae6fd 100%); min-height: 100vh; color: #0f172a; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); border-radius: 16px; }
    .layer-item { background: rgba(255, 255, 255, 0.8); border-radius: 16px; border: 1px solid #93c5fd; transition: all 0.2s; cursor: pointer; padding: 8px; }
    .layer-item.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.25); box-shadow: 0 0 0 2px #3b82f6; }
    .tab-btn { transition: all 0.2s; border-radius: 40px; padding: 8px 20px; font-weight: 700; cursor: pointer; }
    .tab-btn.active { background: #1e40af; color: white; }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #1e3a8a); color: white; border: none; padding: 10px; border-radius: 12px; cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="app" class="max-w-7xl mx-auto px-4 py-4">
  <header class="flex justify-between items-center mb-6 bg-white/60 backdrop-blur-md rounded-2xl p-4 shadow-md">
    <h1 class="font-bold text-2xl text-blue-900">404 PUNKS</h1>
    <span class="text-xs px-3 py-1 bg-green-100 text-green-800 rounded-full font-bold">🌐 Firebase Live</span>
  </header>

  <div class="flex gap-3 mb-6">
    <button onclick="App.switchTab('layers')" class="tab-btn bg-white/60">Layers</button>
    <button onclick="App.switchTab('create')" class="tab-btn bg-white/60">Mint</button>
  </div>

  <div id="panel-layers" class="glass-card p-5">
    <h3 class="font-bold mb-3">Add New Layer (Male/Female Separated)</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <input type="text" id="layer-url" placeholder="Image URL" class="border p-2 rounded-xl">
      <input type="text" id="layer-value" placeholder="Value (e.g. Mohawk)" class="border p-2 rounded-xl">
      <select id="layer-section" class="border p-2 rounded-xl">
        <option value="Base">Base</option><option value="Head">Head</option>
      </select>
      <select id="layer-gender" class="border p-2 rounded-xl">
        <option value="male">♂ Male</option>
        <option value="female">♀ Female</option>
      </select>
      <button onclick="App.addLayer()" class="btn-primary">Add to Firebase</button>
    </div>
  </div>

  <div id="panel-create" class="hidden glass-card p-5">
    <h3 class="font-bold mb-3">Minting Area</h3>
    <p>Male এবং Female ডেটা এখানে ফিল্টার করা হয়েছে।</p>
  </div>

  <div id="toast" class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-2 rounded-full"></div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAOy69Mp1LDbiWE4594ssJvhihKAP89",
    authDomain: "punks-db.firebaseapp.com",
    databaseURL: "https://punks-db-default-rtdb.firebaseio.com",
    projectId: "punks-db",
    storageBucket: "punks-db.firebasestorage.app",
    messagingSenderId: "935797407482",
    appId: "1:935797407482:web:1b77f90478160ac69c1343"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  const App = {
    switchTab(tab) {
      document.getElementById('panel-layers').classList.toggle('hidden', tab !== 'layers');
      document.getElementById('panel-create').classList.toggle('hidden', tab !== 'create');
    },
    addLayer() {
      const url = document.getElementById('layer-url').value;
      const val = document.getElementById('layer-value').value;
      const section = document.getElementById('layer-section').value;
      const gender = document.getElementById('layer-gender').value;

      if(!url || !val) { alert("সব ঘর পূরণ করুন!"); return; }

      // ডেটা স্ট্রাকচার: layers -> gender -> section
      const newLayer = { id: Date.now(), value: val, imageUrl: url };
      database.ref(`layers/${gender}/${section}`).push(newLayer);
      
      document.getElementById('toast').textContent = "✅ " + gender.toUpperCase() + " " + section + " এ যোগ করা হয়েছে!";
      document.getElementById('toast').classList.remove('hidden');
      setTimeout(() => document.getElementById('toast').classList.add('hidden'), 3000);
    }
  };
</script>
</body>
</html>
